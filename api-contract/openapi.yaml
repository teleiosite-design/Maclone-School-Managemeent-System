openapi: 3.1.0
info:
  title: Meclones Backend Contract
  version: 0.1.0
  description: Stable payload contract for FE integration (attendance + admissions + profile/roles)
servers:
  - url: /api/v1
paths:
  /auth/me:
    get:
      summary: Current authenticated user with roles
      responses:
        '200':
          description: Auth user payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'
  /admissions:
    post:
      summary: Submit admission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdmissionEnvelope'
  /teacher/attendance/clock-in:
    post:
      summary: Teacher clock-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClockInPayload'
      responses:
        '200':
          description: Clock-in row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceLogEnvelope'
  /teacher/attendance/clock-out:
    post:
      summary: Teacher clock-out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClockOutPayload'
      responses:
        '200':
          description: Updated row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceLogEnvelope'
  /admin/attendance/surveillance:
    get:
      summary: Admin surveillance list
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceLogListEnvelope'
components:
  schemas:
    EnvelopeMeta:
      type: object
      properties:
        request_id: { type: string }
        timestamp: { type: string, format: date-time }
    AuthUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        full_name: { type: string }
        roles:
          type: array
          items: { type: string, enum: [admin, teacher, student, parent] }
    AuthEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/AuthUser' }
        meta: { $ref: '#/components/schemas/EnvelopeMeta' }
        error: { type: ['object', 'null'] }
    AdmissionCreate:
      type: object
      required: [parent_name, phone, email, child_name, class_applying_for]
      properties:
        parent_name: { type: string }
        phone: { type: string }
        email: { type: string }
        child_name: { type: string }
        class_applying_for: { type: string }
        notes: { type: string }
    AdmissionRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        created_at: { type: string, format: date-time }
    AdmissionEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/AdmissionRecord' }
        meta: { $ref: '#/components/schemas/EnvelopeMeta' }
        error: { type: ['object', 'null'] }
    ClockInPayload:
      type: object
      required: [teacher_id, log_date, clock_in_at]
      properties:
        teacher_id: { type: string, format: uuid }
        log_date: { type: string, format: date }
        clock_in_at: { type: string, format: date-time }
        source_ip: { type: string }
    ClockOutPayload:
      type: object
      required: [teacher_id, log_date, clock_out_at]
      properties:
        teacher_id: { type: string, format: uuid }
        log_date: { type: string, format: date }
        clock_out_at: { type: string, format: date-time }
    AttendanceLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        log_date: { type: string, format: date }
        clock_in_at: { type: string, format: date-time }
        clock_out_at: { type: string, format: date-time }
        outcome: { type: string }
        validation: { type: string }
    AttendanceLogEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/AttendanceLog' }
        meta: { $ref: '#/components/schemas/EnvelopeMeta' }
        error: { type: ['object', 'null'] }
    AttendanceLogListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AttendanceLog' }
        meta:
          allOf:
            - $ref: '#/components/schemas/EnvelopeMeta'
            - type: object
              properties:
                limit: { type: integer }
                offset: { type: integer }
                total: { type: integer }
        error: { type: ['object', 'null'] }
